services:
  xbol-api-client:
    container_name: xbol-api-client
    build:
      context: ./Odasoft.XBOL.ClientAPI
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
    networks:
      - xbol-network

networks:
  xbol-network:
    external: true
